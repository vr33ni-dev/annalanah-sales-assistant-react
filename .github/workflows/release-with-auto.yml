name: Release (auto)

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-with-auto-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node, install deps, and pinned auto
        run: |
          set -euo pipefail
          # Lightweight guard: if this run was triggered by the actions bot (a previous
          # automatic push from this workflow), exit early to avoid loops.
          if [ "${GITHUB_EVENT_NAME:-}" = "push" ] && [ "${GITHUB_ACTOR:-}" = "github-actions[bot]" ]; then
            echo "Run triggered by github-actions[bot]; exiting to avoid recursive release runs."
            exit 0
          fi
          # Verify Node/npm then install project dependencies first (npm ci).
          node -v || true
          npm --version || true
          npm ci
          # Install a pinned auto CLI after npm ci so it is not removed by the installer.
          npm install --no-save auto@latest

      - name: Choose token for pushing tags/commits
        id: choose-token
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          # Prefer a user-provided PAT (recommended when branch protection prevents pushes by GH_TOKEN).
          if [ -n "${RELEASE_PAT:-}" ]; then
            echo "Using RELEASE_PAT for release actions"
            echo "AUTO_TOKEN=${RELEASE_PAT}" >> "$GITHUB_ENV"
          else
            echo "No RELEASE_PAT configured; falling back to GH_TOKEN. If protected branches prevent pushes, create a RELEASE_PAT in repo secrets."
            echo "AUTO_TOKEN=${GH_TOKEN:-}" >> "$GITHUB_ENV"
          fi

      - name: Create release (compute version + changelog, call GitHub API)
        env:
          # Expose repo context and token; AUTO_TOKEN is written to $GITHUB_ENV in the previous step
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_SHA: ${{ github.sha }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # (Diagnostics removed) no files are written by this workflow run.
          # Compute candidate via auto
          # Make the chosen token available as GH_TOKEN for auto and guard the
          # invocation so failures do not abort the whole job.
          export GH_TOKEN="${AUTO_TOKEN:-${GH_TOKEN:-}}"

          # Ensure git identity is configured before invoking `auto` which may
          # create temporary commits during dry-run. Without this auto can fail
          # with "Could not find a git name and email to commit with".
          git config user.name "github-actions[bot]" || true
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com" || true

          # Initialize variables to avoid 'unbound variable' when set -u is used
          CANDIDATE=""
          RAW_VERSION=""

          # Sync local package version with latest remote tag before auto runs.
          # This avoids npm/tag collisions when package.json is behind tags
          # (e.g. local 0.4.x while latest tag is v0.5.0).
          git fetch --tags origin main || true
          LATEST_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || true)
          if [ -n "${LATEST_TAG:-}" ] && [ -f package.json ]; then
            LATEST_NO_V="${LATEST_TAG#v}"
            PKG_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || true)
            if [ -n "${PKG_VERSION:-}" ] && [ "${PKG_VERSION}" != "${LATEST_NO_V}" ]; then
              echo "Synchronizing package version from ${PKG_VERSION} to ${LATEST_NO_V} before auto shipit"
              npm version "${LATEST_NO_V}" --no-git-tag-version --allow-same-version >/dev/null 2>&1 || {
                echo "Warning: failed to sync package version to ${LATEST_NO_V}; continuing" >&2
              }
              # Keep working tree clean for auto: commit sync changes if npm touched files.
              if [ -n "$(git status --porcelain --untracked-files=no | grep -E 'package.json|package-lock.json|pnpm-lock.yaml|yarn.lock' || true)" ]; then
                git add -A package.json package-lock.json pnpm-lock.yaml yarn.lock || true
                if ! git diff --staged --quiet; then
                  git commit -m "chore(release): sync package version to latest tag [skip ci]" || true
                fi
              fi
            fi
          fi

          # Run auto and capture full output for diagnostics (don't print secrets)
            # Prefer using `auto shipit --dry-run` to get the full semver (vX.Y.Z)
            AUTO_SHIPIT_OUTPUT=$(npx auto shipit --dry-run 2>&1 || true)
            if [ -n "$(printf '%s' "$AUTO_SHIPIT_OUTPUT" | tr -d '[:space:]')" ]; then
              echo "---- auto shipit dry-run output ----"
              printf '%s\n' "$AUTO_SHIPIT_OUTPUT"
              echo "---- end auto shipit output ----"
            else
              echo "auto shipit produced no output or failed (non-fatal)"
            fi

            # Save the dry-run output as an artifact for auditability (do not
            # write to repository files). The file will be uploaded by a later
            # workflow step. This helps compare computed candidate vs actual
            # release without touching the repo working tree.
            printf '%s\n' "$AUTO_SHIPIT_OUTPUT" > "$GITHUB_WORKSPACE/auto-shipit-dry-run.log" || true

            # Try to extract the target semver (v1.2.3 or 1.2.3) from shipit output.
            # Important: auto output can include the *current* version before the
            # computed next version, so do not pick the first match.
            # Prefer explicit "would release" lines first, then fall back to the
            # last semver token found in the output.
            CANDIDATE=$(printf '%s\n' "$AUTO_SHIPIT_OUTPUT" | sed -nE 's/.*Would have created a release on GitHub for version:[[:space:]]*(v?[0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | tail -n1 || true)
            if [ -z "${CANDIDATE:-}" ]; then
              CANDIDATE=$(printf '%s\n' "$AUTO_SHIPIT_OUTPUT" | sed -nE 's/.*Would have published:[[:space:]]*(v?[0-9]+\.[0-9]+\.[0-9]+).*/\1/p' | tail -n1 || true)
            fi
            if [ -z "${CANDIDATE:-}" ]; then
              CANDIDATE=$(printf '%s' "$AUTO_SHIPIT_OUTPUT" | grep -E -o 'v?[0-9]+\.[0-9]+\.[0-9]+' | tail -n1 || true)
            fi

            # auto dry-run may touch npm-managed files; restore them so the
            # subsequent real shipit starts from a clean working tree.
            git restore --staged --worktree package.json package-lock.json pnpm-lock.yaml yarn.lock 2>/dev/null || true

            # Ensure we have commits and tags from origin so CHANGELOG/RANGE calculations work
            git fetch --tags origin main || true
            LATEST_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || true)
            if [ -n "${LATEST_TAG:-}" ]; then
              RANGE="${LATEST_TAG}..origin/main"
            else
              RANGE="origin/main"
            fi

          if [ -n "$CANDIDATE" ]; then
            # Normalize tag name to start with 'v'
            case "$CANDIDATE" in
              v*) TAG_NAME="$CANDIDATE" ;;
              *) TAG_NAME="v$CANDIDATE" ;;
            esac
              echo "Computed candidate tag from auto: $TAG_NAME"
          else
            # auto failed or returned unexpected output (e.g. gitlog crash).
            # Fall back to a conservative git-based patch bump so releases
            # continue instead of failing the workflow.
            echo "Warning: 'auto shipit --dry-run' did not return a semver; falling back to git-based bump" >&2
            printf '%s\n' "${RAW_VERSION:-}" >&2 || true
            if [ -n "${LATEST_TAG:-}" ]; then
              BASE=${LATEST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE}"
              MAJOR=${MAJOR:-0}
              MINOR=${MINOR:-0}
              PATCH=${PATCH:-0}
              PATCH=$((PATCH+1))
              TAG_NAME="v${MAJOR}.${MINOR}.${PATCH}"
            else
              # No prior tag found, start at v0.1.0 by default
              TAG_NAME="v0.1.0"
            fi
            echo "Fallback candidate tag: $TAG_NAME"
          fi

          echo "Computed candidate tag: $TAG_NAME"

          # --- Pre-release checks: tag / Release existence ---
          # Use the chosen token for API checks
          AUTH_TOKEN="${AUTO_TOKEN:-${GH_TOKEN:-}}"

          # Check if the tag already exists on the remote
          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists on origin"
            TAG_EXISTS=1
          else
            TAG_EXISTS=0
          fi

          # Check if a GitHub Release for this tag already exists
          RELEASE_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${AUTH_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" || true)
          if [ "${RELEASE_HTTP_CODE}" = "200" ]; then
            echo "GitHub Release for ${TAG_NAME} already exists"
            RELEASE_EXISTS=1
          else
            RELEASE_EXISTS=0
          fi

          if [ "${TAG_EXISTS}" -eq 1 ] && [ "${RELEASE_EXISTS}" -eq 1 ]; then
            echo "Tag and release already exist for ${TAG_NAME}; nothing to do. Exiting."
            exit 0
          fi

          if [ "${TAG_EXISTS}" -eq 1 ] && [ "${RELEASE_EXISTS}" -eq 0 ]; then
            echo "Warning: Tag ${TAG_NAME} exists but Release is missing. Will attempt to run 'auto shipit' to create the release."
          fi

          # We no longer perform a manual package.json bump in CI. Let `auto`
          # perform the version bump and publish atomically via `auto shipit`.
          echo "Skipping manual package.json bump; letting 'auto shipit' perform the bump & publish."
          # Ensure git identity is configured in case auto creates local commits
          git config user.name "${GITHUB_ACTOR:-github-actions[bot]}" || true
          git config user.email "${GITHUB_ACTOR:-github-actions[bot]}@users.noreply.github.com" || true

          # Build a changelog from git history between the last tag and origin/main
          echo "Building changelog for range: $RANGE"
          CHANGELOG=$(git --no-pager log "$RANGE" --pretty=format:"- %s (%an, %h)%n%n%b%n")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entries generated by git log for range $RANGE"
          fi

          # Create the release using `auto shipit` now that package.json has been bumped
          echo "Running 'auto shipit' to publish the release for ${TAG_NAME}"
          export GH_TOKEN="${AUTO_TOKEN:-${GH_TOKEN:-}}"
          # Final guard: ensure no dirty tracked files remain before shipit.
          DIRTY_FILES=$(git status --porcelain --untracked-files=no | grep -v '^$' || true)
          if [ -n "${DIRTY_FILES}" ]; then
            echo "Working tree not clean before shipit; restoring tracked changes:"
            printf '%s\n' "${DIRTY_FILES}"
            git restore --staged --worktree . || true
          fi
          # Run auto shipit (non-dry) to create the tag/release on GitHub. It will operate
          # against the repo and create the release referencing the current HEAD (the bumped commit).
          npx auto shipit || {
            echo "auto shipit failed; aborting release step" >&2
            exit 1
          }

          # --- Post-release verification: ensure the GitHub Release exists before committing lockfiles ---
          # Give GitHub a moment to settle (tags/releases may be briefly eventual-consistent)
          SLEEP_SECS=3
          echo "Waiting ${SLEEP_SECS}s for GitHub to register the release..."
          sleep ${SLEEP_SECS}

          # Re-check release existence via API using the same AUTH_TOKEN
          POST_RELEASE_HTTP_CODE=$(curl -s -o /tmp/post_release_check -w "%{http_code}" -H "Authorization: token ${AUTH_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" || true)
          if [ "${POST_RELEASE_HTTP_CODE}" != "200" ]; then
            echo "Release for ${TAG_NAME} not found after auto shipit; aborting lockfile commit and failing the job." >&2
            echo "GitHub API response (body):" && cat /tmp/post_release_check || true
            exit 1
          fi

          # After auto shipit runs, update lockfiles if needed and push a dedicated commit
          echo "Checking for lockfile changes after auto shipit..."
          # Reinstall to ensure lockfile is deterministic
          npm ci || true

          # Detect common lockfiles
          LOCKFILES_CHANGED=$(git status --porcelain --untracked-files=no | grep -E 'package-lock.json|pnpm-lock.yaml|yarn.lock' || true)
          if [ -n "${LOCKFILES_CHANGED}" ]; then
            echo "Lockfile changes detected:\n${LOCKFILES_CHANGED}"
            # Configure git identity (again) before committing
            git config user.name "${GITHUB_ACTOR:-github-actions[bot]}" || true
            git config user.email "${GITHUB_ACTOR:-github-actions[bot]}@users.noreply.github.com" || true

            # Stage lockfiles that changed
            git add -A package-lock.json pnpm-lock.yaml yarn.lock || true

            # Create a dedicated commit for lockfile updates
            if git diff --staged --quiet; then
              echo "No staged changes to commit"
            else
              git commit -m "chore(release): update lockfile(s) after release [skip ci]" || true

              # Push the lockfile commit using the chosen release token (AUTO_TOKEN)
              if [ -n "${AUTO_TOKEN:-}" ]; then
                echo "Pushing lockfile commit using AUTO_TOKEN"
                # Use token in remote URL for push; avoid printing the token
                git remote set-url origin "https://x-access-token:${AUTO_TOKEN}@github.com/${{ github.repository }}.git"
                git push origin HEAD:main || {
                  echo "Failed to push lockfile commit; please push manually or provide a RELEASE_PAT with push rights" >&2
                }
              else
                echo "AUTO_TOKEN is not set; cannot push lockfile commit" >&2
              fi
            fi
          else
            echo "No lockfile changes detected"
          fi

      - name: Upload auto shipit dry-run output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auto-shipit-dry-run
          path: auto-shipit-dry-run.log
